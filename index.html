<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello again, AGOL! GEOG 576 Lab 3</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <!-- call the arcis api css and js library -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <!-- use css to style full-screen map -->
  <style>  
    html,  
    body,  
    #viewDiv {  
      padding: 0;  
      margin: 0;  
      height: 100%;  
      width: 100%;  
    }  
  </style> 

</head>
<body>

  <!-- create div to hold the map  -->
  <div id="viewDiv"></div> 

 <!-- I moved the script to the body because the page kept erroring out trying to look for the viewDiv element from the head before parsing the body -->
  <script>  

      // add require statement to call modules necessary for full screen map app 
      require([
        "esri/config", 
        "esri/Map", 
        "esri/views/MapView",
        
        // add modules for graphic and graphics layer
        "esri/Graphic",
        "esri/layers/GraphicsLayer",

        // add module for feature layer
        "esri/layers/FeatureLayer",

        // adding in editor widget
        "esri/widgets/Editor",

        // add a legend widget
        "esri/widgets/Legend",

        // adding back in basemap gallery (wrapped in expand), locate, search widgets from lab 1
        "esri/widgets/BasemapGallery",
        "esri/widgets/Locate",
        "esri/widgets/Search",
        "esri/widgets/Expand"

      ], function(esriConfig, Map, MapView, Graphic, GraphicsLayer, FeatureLayer, Legend, Editor, BasemapGallery, Locate, Search, Expand) {   
      
        // set API key and create map with basemap layer
        esriConfig.apiKey = "AAPTaZ2rQpZ3e_kAjLMbAoRHR0g.._fqqp4bDNHHZdzTSsp9AO-QkJHtKqpaj-7Xv25F1YGAftgihPfF0YtKx3TlgjV1fIfgz5d5KD1tO1WludBUUE8UK14qZyasG6wdcyVgej-0RvTJlT6Cqr8NSnHJs2CR-QKtZ6cx1a-DlDQQytvHfcbHYyH2--XMqzLkkWez9t3HIMhqczJVoVTeXmERX-Sc_6OCF9zTuUnAuesDvugrzl5GUAN3LGTz2Zteo1pZkcrVPu2RRO94cFDhn8pvWIVGFeUSd7-icAT1_FDhHahp4";
        const map = new Map({ 
          basemap: "arcgis-community" // Challenge 2: Change intial basemap; I like the look of the arcgis-community basemap
        });

        // create map view, set center and scale, set container property to viewDiv
        const view = new MapView({
          map: map,
          // center: [140.75, 41.78], 
          center: [140.77, 41.78], // Longitude, latitude - centered on Hakodate, Japan
          container: "viewDiv", // Div element
          scale: 45000
        });

        // add graphicsLayer constructor
        const graphicsLayer = new GraphicsLayer();  
        map.add(graphicsLayer);

        // create point graphic to add to the map 
        const point = { //Create a point  
          type: "point",  
          longitude: 140.7042,    // approx long lat of Mt. Hakodate
          latitude: 41.7589
        };

        // Challenge 1: change symbol to something other than a point (I chose a triangle because my POI is a mountain)
        // define style for the point graphic
        const simpleMarkerSymbol = {  
          type: "simple-marker",  
          style: "triangle",
          color: [80, 200, 120],  // Emerald green color
          outline: {  
            color: [255, 255, 255], // White  
            width: 1.5 // increased width slightly 
          }  
        };

        // Challenge 2: add polygon and polyline graphics to the map
        // first, polygon geometry to represent Hakodate Station
        const polygon = {
          type: "polygon",
          rings: [[ // makes a rectangle using approx coordinates of Hakodate Station
            [140.7250, 41.7820], 
            [140.7290, 41.7820], 
            [140.7290, 41.7730],
            [140.7250, 41.7730],
            [140.7250, 41.7820]// closing the polygon with the starting point
          ]]
        };

        // define style for polygon graphic
        const simplePolySymbol = {
          type: "simple-fill",
          color: [255, 255, 255, 0.75], // added slight transparency so I can still see the basemap underneath
          outline: {
            color: [32, 144, 184],
            width: 1
          } 
        }

        // second, polyline geometry to represent very rough route from Hakodate Station to Mt. Hakodate
        const polyline = {
          type: "polyline",
          paths: [
            [140.7250, 41.7730], 
            [140.720, 41.768], 
            [140.715, 41.763], 
            [140.7042, 41.7589] 
          ]
        }
        
        // style polyline graphic 
        const simpleLineSymbol = {
          type: "simple-line",
          color: [32, 144, 184],
          width: 1.5
        }

        // create popup template and define attributes for point, polygon, and polyline
        const popupTemplate = {
            title: "{Name}",
            content: "{Description}"
        }
        const pointattributes = {
            Name: "Mt. Hakodate",
            Description: "A famous landmark in Hakodate, Japan. It is known for its stunning night view of the surrounding bay and city."
        }
        const plygnattributes = {
            Name: "Hakodate Station",
            Description: "The main train station and transport hub in Hakodate."
        }
        const lineattributes = {
            Name: "Route from Hakodate Station to Mt. Hakodate Ropeway",
            Description: "A popular walking route that takes about 25-30 minutes."
        }

        // create pointGraphic by adding geometry and symbol together
        const pointGraphic = new Graphic({  
          geometry: point,  
          symbol: simpleMarkerSymbol,

          // add popup properties
          attributes: pointattributes,
          popupTemplate: popupTemplate

        });

        //create polygonGraphic, add geometry and symbol, then attributes
        const polygonGraphic = new Graphic({
          geometry: polygon,
          symbol: simplePolySymbol,
          attributes: plygnattributes,
          popupTemplate: popupTemplate
        })

        // create polylineGraphic, same method as above
        const polylineGraphic = new Graphic({
          geometry: polyline,
          symbol: simpleLineSymbol,
          attributes: lineattributes,
          popupTemplate: popupTemplate
        })

        // add polygon and polyline graphics to the map
        graphicsLayer.add(polygonGraphic);
        graphicsLayer.add(polylineGraphic);
        // add point graphic last so it renders on top of the polyline
        graphicsLayer.add(pointGraphic);

        // Challenge 3: add feature layer, modify popup content
        // Define a pop-up for tourist attractions layer
        const popupTouristAttractions = {
          "title": "{name}", // in Japanese (not every feature has an English name)
          "content": "<b>English Name:</b> {name_en}<br><b>Type:</b> {tourism}<br><b>Hours:</b> {opening_hours}<br><a href='{website}' target='_blank'>Visit Website</a>"
        }

        // add constructor for the tourist attractions feature layer. 
        const touristAttractionsLayer = new FeatureLayer({
          // I downloaded the layer from AGOL. The original publisher is Steven Moore, who credits OpenStreetMap contributors for the data
          url: "https://services-ap1.arcgis.com/iA7fZQOnjY9D67Zx/arcgis/rest/services/OSM_AS_Tourism/FeatureServer",
        
          //add the popup 
          outFields: ["name", "name_en", "tourism", "opening_hours", "website"],
          popupTemplate: popupTouristAttractions
        });

        map.add(touristAttractionsLayer);


        // I downloaded the original Japan Airports dataset from https://ourairports.com/countries/JP/ in csv format. I uploaded the csv to ArcGIS Online and published it as a hosted feature layer as instructed
        // set up the airport icon
        const airportRenderer = {
        "type": "simple",
        "symbol": {
          "type": "picture-marker",
          // airplane icon is from the Noun Project, attribution: Airplane by Annisa from <a href="https://thenounproject.com/browse/icons/term/airplane/" target="_blank" title="Airplane Icons">Noun Project</a> (CC BY 3.0)
          "url": "https://raw.githubusercontent.com/HarpistHope/agol_lab/main/noun-airplane-7936713.png",
          "width": "20px",
          "height": "20px"
        }
      }

      // set up heliport icon
      const heliRenderer = {
        "type": "simple",
        "symbol": {
          "type": "picture-marker",
          // helicopter icon is from the Noun Project, attribution: Adrien Griveau <a href="https://thenounproject.com/icon/helicopter-1595852/" target="_blank" title="Helicopter">Noun Project</a> (CC BY 3.0)
          "url": "https://raw.githubusercontent.com/HarpistHope/agol_lab/main/noun-helicopter-1595852.png",
          "width": "20px",
          "height": "20px"
        }
      }

        //const to make the airport labels
        const airportLabels = {
          symbol: {
            type: "text",
            color: "#004D40",
            haloColor: "#E0F2F1",
            haloSize: "2px",
            font: {
              size: "12px",
              family: "Noto Sans",
              style: "italic",
              weight: "normal"
            }
          },

          labelPlacement: "above-center",
          labelExpressionInfo: {
            expression: "$feature.name"
          }
        };

        // const to make heliport labels
        const heliLabels = {
          symbol: {
            type: "text",
            color: "#311B92",
            haloColor: "#E0F2F1",
            haloSize: "2px",
            font: {
              size: "12px",
              family: "Noto Sans",
              style: "italic",
              weight: "normal"
            }
          },

          labelPlacement: "above-center",
          labelExpressionInfo: {
            expression: "$feature.name"
          }
        };

        // add constructor for the airports feature layer
        const airportsLayer = new FeatureLayer({
          url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/jp_airports_credit_ourairports/FeatureServer",
          // call the icon
          renderer: airportRenderer,
          // sql filter for large airports (Hakodate Airport falls in this category)
          definitionExpression: "type = 'large_airport'",
          labelingInfo: [airportLabels] // add labels to the airports
        });
      
        // add the airports layer to the map
        map.add(airportsLayer);

      // add constructor for the heliports feature layer
      const heliportsLayer = new FeatureLayer({
        url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/jp_airports_credit_ourairports/FeatureServer",
        // call the heliport icon
        renderer: heliRenderer,
        // sql filter for heliports
        definitionExpression: "type = 'heliport'",
        labelingInfo: [heliLabels] // add labels to the heliports
      });

      // add heliports layer to the map
      map.add(heliportsLayer);

      // Lab 3 Challenge 1: Customize myAirport Layer Symbol with picture marker
      // create the symbol/picture marker 
      // (I used the same Noun Project airplane icon but changed the color to red with Adobe Express) Attribution: Airplane by Annisa from <a href="https://thenounproject.com/browse/icons/term/airplane/" target="_blank" title="Airplane Icons">Noun Project</a> (CC BY 3.0)
      const myAirportPictureMarker = {
      type: "picture-marker", 
      url: "https://raw.githubusercontent.com/HarpistHope/agolrest_lab3/main/noun-airplane-7936713_editRed.png",
      width: "20px",
      height: "20px"
      };

      // create a renderer using the symbol
      const myAirportRenderer = {
        type: "simple",
        symbol: myAirportPictureMarker
      };

      // Lab 3 Challenge 2: add dynamic label with airport code to myAirport layer 
      const myAirportLabels = {
        symbol: {
          type: "text",
          color: "#B71C1C", // red to match myAirport icon
          haloColor: "#FFCDD2",
          haloSize: "2px",
          yoffset: -5, // I'm specifying the yoffset so the dynamic label doesn't drift too far below the icon
          font: {
            size: "12px",
            family: "Noto Sans",
            style: "italic",
            weight: "normal",
          }
        },

        labelPlacement: "below-center", // so it doesn't overlap the full airport name label 
        labelExpressionInfo: {
          expression: "$feature.AirportCode"
        }
      };

      // adding the const for the My Airports feature layer
      const myAirports = new FeatureLayer({
        url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/MyAirports_GEOG576/FeatureServer",

        // add airport code popup
        outFields: ["AirportCode"],

        // add symbol renderer
        renderer: myAirportRenderer,

        // add labels
        labelingInfo: [myAirportLabels]
      });

      // add myAirports layer to the map
      map.add(myAirports);

      // Set the point layer's LayerInfo
      const pointInfos = {
      layer: myAirports
      }

      // Begin Editor constructor
      const editor = new Editor({
      view: view,
      layerInfos: [pointInfos]
      }); // End Editor constructor

      // Add the editor widget to the view
      view.ui.add(editor, {
        position: "top-right"
    });

      // Challenge 3a: add a legend to the map
      const legend = new Legend({
        view: view,
        layerInfos: [
          {layer: myAirports, title: "My Airports"},
          {layer: airportsLayer, title: "Major Airports"},
          {layer: heliportsLayer, title: "Heliports"}
        ]
      });

      // add legend to the bottom left corner of the view (so it does not overlap with the editor widget)
      view.ui.add(legend, {
        position: "bottom-left"
      });

      // Challenge 3b: wrap basemap gallery widget inside the expand widget for improved UI/UX
        const basemapGallery = new BasemapGallery({
          view: view
        });
        const bmgExpand = new Expand({
          view: view, 
          content: basemapGallery,
          expandIcon: "basemap" // use basemap icon for expand widget
        });

        // Add basemap gallery expand widget to the top right corner of the view
        view.ui.add(bmgExpand, {
          position: "top-left",
          index: 2 // placed above the editor widget
        });

        // Challenge 4: add locate button
        // create locate widget 
        const locateWidget = new Locate({
          view: view
        });
        // add locate widget to the top left corner of the view, below other elements
        view.ui.add(locateWidget, {
          position: "top-left",
          index: 1
        });

        // Challenge 5: add search bar
        // create search widget
        const searchWidget = new Search({
          view: view
        });
        // Add search widget in top left corner of the view, above locate widget and zoom controls
        view.ui.add(searchWidget, {
          position: "top-left",
          index: 0
        });

      });  


  </script>

</body>
</html>
