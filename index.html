<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, AGOL! GEOG 576 Lab 2</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <!-- call the arcis api css and js library -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

  <!-- use css to style full-screen map -->
  <style>  
    html,  
    body,  
    #viewDiv {  
      padding: 0;  
      margin: 0;  
      height: 100%;  
      width: 100%;  
    }  
  </style> 

</head>
<body>

  <!-- create div to hold the map  -->
  <div id="viewDiv"></div> 

 <!-- I moved the script to the body because the page kept erroring out trying to look for the viewDiv element from the head before parsing the body -->
  <script>  

      // add require statement to call modules necessary for full screen map app 
      require([
        "esri/config", 
        "esri/Map", 
        "esri/views/MapView",
        
        // add modules for graphic and graphics layer
        "esri/Graphic",
        "esri/layers/GraphicsLayer",

        // add module for feature layer
        "esri/layers/FeatureLayer"

      ], function(esriConfig, Map, MapView, Graphic, GraphicsLayer, FeatureLayer) {   
      
        // set API key and create map with basemap layer
        esriConfig.apiKey = "AAPTaZ2rQpZ3e_kAjLMbAoRHR0g.._fqqp4bDNHHZdzTSsp9AO-QkJHtKqpaj-7Xv25F1YGAftgihPfF0YtKx3TlgjV1fIfgz5d5KD1tO1WludBUUE8UK14qZyasG6wdcyVgej-0RvTJlT6Cqr8NSnHJs2CR-QKtZ6cx1a-DlDQQytvHfcbHYyH2--XMqzLkkWez9t3HIMhqczJVoVTeXmERX-Sc_6OCF9zTuUnAuesDvugrzl5GUAN3LGTz2Zteo1pZkcrVPu2RRO94cFDhn8pvWIVGFeUSd7-icAT1_FDhHahp4";
        const map = new Map({ 
          basemap: "arcgis-community" // Challenge 2: Change intial basemap; I like the look of the arcgis-community basemap
        });

        // create map view, set center and scale, set container property to viewDiv
        const view = new MapView({
          map: map,
          // center: [140.75, 41.78], // Longitude, latitude - centered on Hakodate, Japan
          center: [140.715, 41.765],
          container: "viewDiv", // Div element
          scale: 20000
        });

        // add graphicsLayer constructor
        const graphicsLayer = new GraphicsLayer();  
        map.add(graphicsLayer);

        // create point graphic to add to the map 
        const point = { //Create a point  
          type: "point",  
          longitude: 140.7042,    // approx long lat of Mt. Hakodate
          latitude: 41.7589
        };

        // Challenge 1: change symbol to something other than a point (I chose a triangle because my POI is a mountain)
        // define style for the point graphic
        const simpleMarkerSymbol = {  
          type: "simple-marker",  
          style: "triangle",
          color: [80, 200, 120],  // Emerald green color
          outline: {  
            color: [255, 255, 255], // White  
            width: 1.5 // increased width slightly 
          }  
        };

        // Challenge 2: add polygon and polyline graphics to the map
        // first, polygon geometry to represent Hakodate Station
        const polygon = {
          type: "polygon",
          rings: [[ // approx coordinates of Hakodate Station
            [140.7250, 41.7820], 
            [140.7290, 41.7820], 
            [140.7290, 41.7750],
            [140.7250, 41.7750],
            [140.7250, 41.7820]// closing the polygon with the starting point
          ]]
        };
        // define style for polygon graphic
        const simplePolySymbol = {
          type: "simple-fill",
          color: [255, 255, 255, 0.75], // added slight transparency so I can still see the basemap underneath
          outline: {
            color: [32, 144, 184],
            width: 1
          } 
        }

        // second, polyline geometry to represent very rough route from Hakodate Station to Mt. Hakodate
        const polyline = {
          type: "polyline",
          paths: [
            [140.7250, 41.7750], 
            [140.720, 41.768], 
            [140.715, 41.763], 
            [140.7042, 41.7589] 
          ]
        }
        // style polyline graphic 
        const simpleLineSymbol = {
          type: "simple-line",
          color: [32, 144, 184],
          width: 1.5
        }

        // create popup template and define attributes for my point, polygon, and polyline
        const popupTemplate = {
            title: "{Name}",
            content: "{Description}"
        }
        const pointattributes = {
            Name: "Mt. Hakodate",
            Description: "A famous landmark in Hakodate, Japan. It is known for its stunning night view of the surrounding bay and city."
        }
        const plygnattributes = {
            Name: "Hakodate Station",
            Description: "The main train station and transport hub in Hakodate."
        }
        const lineattributes = {
            Name: "Route from Hakodate Station to Mt. Hakodate Ropeway",
            Description: "A popular walking route that takes about 25-30 minutes."
        }

        // create pointGraphic by adding geometry and symbol together
        const pointGraphic = new Graphic({  
          geometry: point,  
          symbol: simpleMarkerSymbol,

          // add popup properties
          attributes: pointattributes,
          popupTemplate: popupTemplate

        });

        //create polygonGraphic, add geometry and symbol, then attributes
        const polygonGraphic = new Graphic({
          geometry: polygon,
          symbol: simplePolySymbol,
          attributes: plygnattributes,
          popupTemplate: popupTemplate
        })

        // create polylineGraphic, same method as above
        const polylineGraphic = new Graphic({
          geometry: polyline,
          symbol: simpleLineSymbol,
          attributes: lineattributes,
          popupTemplate: popupTemplate
        })
        // add polygon and polyline graphics to the map
        graphicsLayer.add(polygonGraphic);
        graphicsLayer.add(polylineGraphic);
        // add point graphic last so it renders on top of the polyline
        graphicsLayer.add(pointGraphic);

        // Challenge 3: add feature layer, modify popup 
        // Define a pop-up for usaeduLayer
        const popupTouristAttractions = {
          "title": "{name}",
          "content": "<b>English Name:</b> {name_en}<br><b>Type:</b> {tourism}<br><b>Hours:</b> {opening_hours}<br><a href='{website}' target='_blank'>Visit Website</a>"
        }

        // add constructor for the feature layer
        const touristAttractionsLayer = new FeatureLayer({
          url: "https://services-ap1.arcgis.com/iA7fZQOnjY9D67Zx/arcgis/rest/services/OSM_AS_Tourism/FeatureServer",
        
          //add the popup here
          outFields: ["name", "name_en", "tourism", "opening_hours", "website"],
          popupTemplate: popupTouristAttractions
        });

        map.add(touristAttractionsLayer);
      });  

  </script>

</body>
</html>
